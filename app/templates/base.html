<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}良华量化{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">良华量化</a>
        </div>
        <ul class="nav-links">
            <li><a href="/">首页</a></li>
            <li><a href="/ranking">资金排行</a></li>
            <li><a href="/backtest">在线回测</a></li>
            <li>
                <button id="theme-toggle" class="theme-toggle" aria-label="切换暗色模式">
                    <span class="theme-icon">🌙</span>
                </button>
            </li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- 加载遮罩 -->
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="loading-box">
            <div class="loading-spinner-ring"></div>
            <p class="loading-text">正在分析中，请稍候...</p>
        </div>
    </div>

    <footer class="footer">
        <p>免责声明：本系统仅提供数据分析参考，不构成任何投资建议。股市有风险，投资需谨慎。</p>
    </footer>

    <script>
    // Dark mode toggle
    (function() {
        const html = document.documentElement;
        const toggle = document.getElementById('theme-toggle');
        const icon = toggle?.querySelector('.theme-icon');
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            html.setAttribute('data-theme', 'dark');
            if (icon) icon.textContent = '☀️';
        }
        if (toggle) {
            toggle.addEventListener('click', () => {
                const isDark = html.getAttribute('data-theme') === 'dark';
                html.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
                if (icon) icon.textContent = isDark ? '🌙' : '☀️';
            });
        }
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

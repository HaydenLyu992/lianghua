{% extends "base.html" %}
{% block title %}在线回测 — 良华分析{% endblock %}

{% block content %}
<h1>在线回测</h1>

<form id="backtest-form" class="backtest-form" onsubmit="runBacktest(event)">
    <div class="form-row">
        <label>股票代码 <input type="text" name="code" value="000001" required></label>
        <label>初始资金 <input type="number" name="cash" value="100000" step="10000"></label>
        <label>策略
            <select name="strategy">
                {% for key, info in strategies.items() %}
                <option value="{{ key }}">{{ info.label }}</option>
                {% endfor %}
            </select>
        </label>
    </div>

    <div class="form-row">
        <label>开始日期 <input type="date" name="start" value="2024-01-01"></label>
        <label>结束日期 <input type="date" name="end" value="2025-12-31"></label>
    </div>

    <div id="strategy-params" class="form-row">
    </div>

    <button type="submit" class="btn-primary" id="run-btn">开始回测</button>
</form>

<div id="backtest-result" style="display:none;">
    <h2>回测结果</h2>
    <div class="result-grid" id="result-metrics"></div>
    <div id="equity-section" style="display:none;">
        <h3 class="chart-title">权益曲线</h3>
        <canvas id="equityChart" width="700" height="350"></canvas>
    </div>
    <div id="trade-section" style="display:none;">
        <h3>回测概况</h3>
        <div id="trade-summary"></div>
    </div>
    <div class="result-error" id="result-error" style="display:none;"></div>
</div>

<a href="/" class="back-link">← 返回首页</a>
{% endblock %}

{% block scripts %}
<script src="/static/js/charts.js"></script>
<script>
const strategyParams = {
    ma_cross: [
        {name:'fast', label:'快线周期', value:5, type:'number'},
        {name:'slow', label:'慢线周期', value:20, type:'number'}
    ],
    momentum: [
        {name:'lookback', label:'回顾周期', value:20, type:'number'},
        {name:'holding', label:'持仓周期', value:10, type:'number'}
    ],
    mean_rev: [
        {name:'period', label:'均值周期', value:20, type:'number'},
        {name:'threshold', label:'阈值', value:0.05, type:'number', step:0.01}
    ],
    rsi: [
        {name:'period', label:'RSI周期', value:14, type:'number'},
        {name:'oversold', label:'超卖阈值', value:30, type:'number'},
        {name:'overbought', label:'超买阈值', value:70, type:'number'}
    ],
    bollinger: [
        {name:'period', label:'布林周期', value:20, type:'number'},
        {name:'devfactor', label:'标准差倍数', value:2.0, type:'number', step:0.1}
    ]
};

document.querySelector('[name="strategy"]').addEventListener('change', function() {
    const params = strategyParams[this.value] || [];
    const container = document.getElementById('strategy-params');
    container.innerHTML = params.map(p =>
        `<label>${p.label} <input type="${p.type}" name="${p.name}" value="${p.value}" step="${p.step||1}"></label>`
    ).join('');
});
document.querySelector('[name="strategy"]').dispatchEvent(new Event('change'));

let equityChart = null;

async function runBacktest(e) {
    e.preventDefault();
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = '回测运行中...';

    const form = document.getElementById('backtest-form');
    const fd = new FormData(form);
    const body = Object.fromEntries(fd.entries());
    body.cash = parseFloat(body.cash);
    ['period','oversold','overbought','fast','slow','lookback','holding'].forEach(k => {
        if (body[k]) body[k] = parseInt(body[k]);
    });
    if (body.threshold) body.threshold = parseFloat(body.threshold);
    if (body.devfactor) body.devfactor = parseFloat(body.devfactor);

    const res = await fetch('/api/backtest/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    const data = await res.json();
    btn.disabled = false;
    btn.textContent = '开始回测';

    document.getElementById('backtest-result').style.display = 'block';

    if (data.error) {
        document.getElementById('result-error').style.display = 'block';
        document.getElementById('result-error').textContent = data.error;
        document.getElementById('result-metrics').innerHTML = '';
        document.getElementById('equity-section').style.display = 'none';
        document.getElementById('trade-section').style.display = 'none';
        return;
    }

    document.getElementById('result-error').style.display = 'none';
    document.getElementById('result-metrics').innerHTML = [
        {label:'总收益率', value: data.total_return + '%', cls: data.total_return >= 0 ? 'positive' : 'negative'},
        {label:'最终资产', value: '¥' + data.end_value.toLocaleString()},
        {label:'夏普比率', value: data.sharpe_ratio},
        {label:'最大回撤', value: data.max_drawdown + '%'},
        {label:'胜率', value: data.win_rate + '%'},
        {label:'成交次数', value: data.total_trades},
    ].map(m =>
        `<div class="metric-card"><span class="metric-value ${m.cls||''}">${m.value}</span><span class="metric-label">${m.label}</span></div>`
    ).join('');

    // Equity curve chart
    if (data.equity_curve && data.equity_curve.length > 0) {
        document.getElementById('equity-section').style.display = 'block';
        const dates = data.equity_curve.map(p => p.date);
        const values = data.equity_curve.map(p => p.value);
        if (equityChart) equityChart.destroy();
        equityChart = Charts.createLine('equityChart', dates, [
            {
                label: '账户权益',
                data: values,
                borderColor: '#e94560',
                backgroundColor: 'rgba(233,69,96,0.05)',
                fill: true,
                tension: 0.1,
                pointRadius: 0,
            }
        ]);
    } else {
        document.getElementById('equity-section').style.display = 'none';
    }

    // Trade summary
    if (data.trade_summary && data.trade_summary.length > 0) {
        document.getElementById('trade-section').style.display = 'block';
        const ts = data.trade_summary[0];
        document.getElementById('trade-summary').innerHTML =
            `<div class="result-grid">
                <div class="metric-card"><span class="metric-value positive">${ts.won}</span><span class="metric-label">盈利次数</span></div>
                <div class="metric-card"><span class="metric-value negative">${ts.lost}</span><span class="metric-label">亏损次数</span></div>
                <div class="metric-card"><span class="metric-value positive">¥${(ts.won_total_pnl||0).toLocaleString()}</span><span class="metric-label">盈利总额</span></div>
                <div class="metric-card"><span class="metric-value negative">¥${(ts.lost_total_pnl||0).toLocaleString()}</span><span class="metric-label">亏损总额</span></div>
            </div>`;
    } else {
        document.getElementById('trade-section').style.display = 'none';
    }
}
</script>
{% endblock %}

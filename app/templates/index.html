{% extends "base.html" %}
{% block title %}良华分析 — A股多因子分析系统{% endblock %}

{% block content %}
<div class="hero">
    <h1>A股多因子分析系统</h1>
    <p class="subtitle">从基本面、行业、宏观、资金流向、情绪技术、地缘 6 个维度综合研判个股涨跌趋势</p>

    <form action="/analyze" method="get" class="search-form" id="search-form" onsubmit="document.getElementById('loading-overlay').style.display='flex'">
        <div class="search-wrapper">
            <input
                type="text"
                name="code"
                placeholder="输入股票代码或名称，如 000001、平安银行"
                required
                autofocus
                class="search-input"
                autocomplete="off"
                hx-get="/api/suggest"
                hx-trigger="keyup changed delay:200ms"
                hx-target="#search-suggestions"
                hx-swap="innerHTML"
            >
            <div id="search-suggestions" class="search-suggestions" style="display:none">
                <div id="suggest-spinner" class="suggest-spinner">
                    <span class="spinner-dot"></span> 匹配中...
                </div>
            </div>
        </div>
        <button type="submit" class="btn-primary">开始分析</button>
    </form>

    <div class="quick-links">
        <a href="/ranking" class="quick-link-card">
            <span class="card-icon">📊</span>
            <span class="card-title">资金流向排行榜</span>
            <span class="card-desc">实时主力资金净流入/流出 TOP 50</span>
        </a>
        <a href="/backtest" class="quick-link-card">
            <span class="card-icon">📈</span>
            <span class="card-title">在线回测</span>
            <span class="card-desc">自定义策略 + 历史数据验证</span>
        </a>
    </div>

    <div class="example-stocks">
        <span>热门标的：</span>
        <a href="/analyze?code=000001">平安银行</a>
        <a href="/analyze?code=600519">贵州茅台</a>
        <a href="/analyze?code=300750">宁德时代</a>
        <a href="/analyze?code=000858">五粮液</a>
        <a href="/analyze?code=002594">比亚迪</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const input = document.querySelector('[name="code"]');
const suggBox = document.getElementById('search-suggestions');

// 输入时立即显示下拉框
input.addEventListener('input', function() {
    if (this.value.trim().length >= 1) {
        suggBox.style.display = 'block';
        // 显示 spinner 直到 HTMX 返回结果
        if (!suggBox.querySelector('.suggest-item') && !suggBox.querySelector('.suggest-empty')) {
            suggBox.innerHTML = '<div class="suggest-spinner"><span class="spinner-dot"></span> 匹配中...</div>';
        }
    } else {
        suggBox.style.display = 'none';
        suggBox.innerHTML = '';
    }
});

// HTMX 返回后，如果无结果则保持 spinner
document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target.id === 'search-suggestions') {
        if (input.value.trim().length >= 1) {
            suggBox.style.display = 'block';
            // 如果返回空（无匹配项且无提示），保持 spinner
            if (!suggBox.querySelector('.suggest-item') && !suggBox.querySelector('.suggest-empty')) {
                suggBox.innerHTML = '<div class="suggest-spinner"><span class="spinner-dot"></span> 匹配中...</div>';
            }
        }
    }
});

// Click suggestion to fill search input and submit
document.body.addEventListener('click', function(e) {
    if (e.target.closest('.suggest-item')) {
        const item = e.target.closest('.suggest-item');
        input.value = item.dataset.code;
        suggBox.innerHTML = '';
        suggBox.style.display = 'none';
        document.getElementById('search-form').submit();
    }
});

// Hide suggestions on outside click
document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrapper')) {
        suggBox.innerHTML = '';
        suggBox.style.display = 'none';
    }
});
</script>
{% endblock %}
